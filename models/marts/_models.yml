version: 2

models:
  - name: dim_businesses
    description: "One row per Yelp business, with dimensions for analysis."
    columns:
      - name: business_id
        description: "Yelp's primary identifier for a business."
        tests:
          - unique
          - not_null

      - name: stars
        description: "Review rating, 1 to 5."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5]
                quote: false

  - name: fct_reviews
    description: "Reviews"
    columns:
      - name: business_id
        description: "Yelp's primary identifier for a business."
        tests:
          - not_null

      - name: stars
        description: "Review rating, 1 to 5."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5]
                quote: false
